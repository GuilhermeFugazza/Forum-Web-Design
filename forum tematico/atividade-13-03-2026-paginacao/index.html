<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Atividade Extra - Paginação com ul e li</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="conteudo">
    <header>
      <h1>Atividade da semana - 13/03/2026</h1>
      <p>Criar o link das páginas com ul, li, classes e combinadores em CSS.</p>
    </header>

    <section class="bloco">
      <h2>Normal</h2>
      <ul class="paginacao normal">
        <li class="item"><a href="#">«</a></li>
        <li class="item"><a href="#">1</a></li>
        <li class="item"><a href="#">2</a></li>
        <li class="item"><a href="#">3</a></li>
        <li class="item"><a href="#">»</a></li>
      </ul>
    </section>

    <section class="bloco">
      <h2>Quando passar o mouse</h2>
      <ul class="paginacao hover-demo">
        <li class="item"><a href="#">«</a></li>
        <li class="item"><a href="#">1</a></li>
        <li class="item"><a href="#">2</a></li>
        <li class="item"><a href="#">3</a></li>
        <li class="item"><a href="#">»</a></li>
      </ul>
    </section>
  </main>
</body>
</html>
